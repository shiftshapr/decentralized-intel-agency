<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Decentralized Intel Agency</title>
  <meta name="description" content="Decentralized Intel Agency">
  <style>
    :root { --bg: #0a0e14; --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    h1 { font-size: clamp(1.5rem, 4vw, 2rem); font-weight: 600; margin: 0 0 0.75rem; letter-spacing: -0.02em; }
    p { margin: 0; color: var(--muted); max-width: 36rem; line-height: 1.5; }
    .domain { color: var(--accent); font-weight: 500; }
    code { font-size: 0.9em; }
  </style>
</head>
<body>
  <h1>Decentralized Intel Agency</h1>
  <p><span class="domain">decentralizedintel.agency</span> — static files in <code>public/</code>; API at <code>/api/</code> (xowlz-style stack).</p>
</body>
</html>
