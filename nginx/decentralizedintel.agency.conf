# decentralizedintel.agency — static public/ + Express API (same pattern as nft.xowlz.com)
# Install: sudo cp /home/ubuntu/decentralizedintel-agency/nginx/decentralizedintel.agency.conf /etc/nginx/sites-available/
#          sudo ln -sf /etc/nginx/sites-available/decentralizedintel.agency.conf /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx
# API: sudo systemctl enable --now decentralized-intel-site.service  (port 4013)
# TLS: sudo certbot --nginx -d decentralizedintel.agency -d www.decentralizedintel.agency

server {
    listen 80;
    listen [::]:80;
    server_name decentralizedintel.agency www.decentralizedintel.agency;

    root /home/ubuntu/decentralizedintel-agency/public;
    index index.html;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
        allow all;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:4013;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
