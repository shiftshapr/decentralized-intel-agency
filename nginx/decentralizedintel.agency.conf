# decentralizedintel.agency — Canopi community (same upstream as app.canopi.live)
# Install: sudo cp /home/ubuntu/decentralizedintel-agency/nginx/decentralizedintel.agency.conf /etc/nginx/sites-available/
#          sudo ln -sf /etc/nginx/sites-available/decentralizedintel.agency.conf /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx
# TLS: sudo certbot --nginx -d decentralizedintel.agency -d www.decentralizedintel.agency
# App: add https://decentralizedintel.agency (and www if used) to Supabase / OAuth redirect URLs.

server {
    listen 80;
    listen [::]:80;
    server_name decentralizedintel.agency www.decentralizedintel.agency;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
        allow all;
    }

    # ── Backend-only paths — Canopi Node backend (3002) ─────────────────────

    location /api/ {
        proxy_pass http://localhost:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /embed-sidepanel {
        return 302 https://api.canopi.live$request_uri;
    }

    location = /bookmarklet {
        return 302 https://api.canopi.live/bookmarklet;
    }

    location = /.build-info.json {
        alias /home/ubuntu/canopi/presence/extension/.build-info.json;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Access-Control-Allow-Origin "*" always;
    }
    location = /services/SupabaseService.js {
        alias /home/ubuntu/canopi/presence/extension/services/SupabaseService.js;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Content-Type "application/javascript" always;
    }
    location = /LifecycleManager.js {
        alias /home/ubuntu/canopi/presence/extension/core/LifecycleManager.js;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Content-Type "application/javascript" always;
    }
    location = /extension/.build-info.json {
        alias /home/ubuntu/canopi/presence/extension/.build-info.json;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Access-Control-Allow-Origin "*" always;
    }

    location /extension/ {
        proxy_pass http://localhost:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    location /embed/ {
        proxy_pass http://localhost:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    location /v1/ {
        proxy_pass http://localhost:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws {
        proxy_pass http://localhost:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    location /health {
        proxy_pass http://localhost:3002/health;
        proxy_set_header Host $host;
    }

    location /uploads/ {
        alias /home/ubuntu/metalayer-initiative/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Everything else → Next.js (4000) ────────────────────────────────────
    location / {
        proxy_pass http://localhost:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
