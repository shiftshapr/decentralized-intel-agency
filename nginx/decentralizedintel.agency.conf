# decentralizedintel.agency — DIA static site (public/) + Express /api on 4013
# NOT Canopi — do not proxy to 3002/4000 here.
#
# Deploy:
#   sudo cp /home/ubuntu/decentralizedintel-agency/nginx/decentralizedintel.agency.conf /etc/nginx/sites-available/decentralizedintel.agency.conf
#   sudo nginx -t && sudo systemctl reload nginx
# API: sudo systemctl enable --now decentralized-intel-site.service

server {
    server_name decentralizedintel.agency www.decentralizedintel.agency;

    root /home/ubuntu/decentralizedintel-agency/public;
    index index.html;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
        allow all;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:4013;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    listen 443 ssl; # managed by Certbot
    listen [::]:443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/decentralizedintel.agency/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/decentralizedintel.agency/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = www.decentralizedintel.agency) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = decentralizedintel.agency) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    listen [::]:80;
    server_name decentralizedintel.agency www.decentralizedintel.agency;
    return 404; # managed by Certbot
}
